<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>System Engenharia — Relatórios de Manutenção</title>
  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#1A1A1A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SysE Relatórios"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            snormal:  '#16a34a',
            swarning: '#d97706',
            sdanger:  '#dc2626',
            sinop:    '#6b7280'
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    .status-badge-normal     { background: #dcfce7; color: #15803d; border: 1.5px solid #16a34a; }
    .status-badge-atencao    { background: #fef3c7; color: #b45309; border: 1.5px solid #d97706; }
    .status-badge-urgente    { background: #fee2e2; color: #b91c1c; border: 1.5px solid #dc2626; }
    .status-badge-inoperante { background: #f3f4f6; color: #374151; border: 1.5px solid #6b7280; }

    .ring-normal     { ring-color: #16a34a; outline: 2px solid #16a34a; outline-offset: 2px; }
    .ring-atencao    { ring-color: #d97706; outline: 2px solid #d97706; outline-offset: 2px; }
    .ring-urgente    { ring-color: #dc2626; outline: 2px solid #dc2626; outline-offset: 2px; }
    .ring-inoperante { ring-color: #6b7280; outline: 2px solid #6b7280; outline-offset: 2px; }

    .upload-area {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2px dashed #cbd5e1; border-radius: 0.75rem; padding: 1rem;
      cursor: pointer; transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #f97316; }

    body { -webkit-tap-highlight-color: transparent; }

    @media print {
      body * { visibility: hidden; }
      #preview-content, #preview-content * { visibility: visible; }
      #preview-content { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</head>
<body x-data="reportApp()" x-cloak class="bg-slate-100 min-h-screen font-sans">

  <!-- ░░░░░░░░░░░░░░ TOAST ░░░░░░░░░░░░░░ -->
  <div
    x-show="toast.show"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full text-sm font-medium shadow-lg pointer-events-none"
    :class="toast.type==='error' ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'"
    x-text="toast.msg"
  ></div>

  <!-- ░░░░░░░░░░░░░░ VIEW: DASHBOARD ░░░░░░░░░░░░░░ -->
